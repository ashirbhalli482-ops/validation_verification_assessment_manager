{% if table_layout and display_table_cells %}
<div class="mb-4">
  <h6 class="font-weight-bold">Form Table</h6>
  <div class="table-responsive">
    <table class="table table-bordered table-sm mb-0">
      <thead class="thead-light">
        <tr>
          {% for header in table_layout.column_headers %}
          <th>{{ header }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in display_table_cells %}
        <tr>
          {% for cell in row %}
          <td>{{ cell|default:'—' }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endif %}
