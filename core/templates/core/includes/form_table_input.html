{% if table_layout and table_cells %}
<div class="form-group mt-4">
  <label class="d-block font-weight-bold">Form Table</label>
  <p class="text-muted small">Column headings are set by the administrator. Enter data in the cells below.</p>
  <div class="table-responsive">
    <table class="table table-bordered table-sm mb-0">
      <thead class="thead-light">
        <tr>
          {% for header in table_layout.column_headers %}
          <th>{{ header }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in table_cells %}
        <tr>
          {% for cell in row %}
          <td>
            <input type="text"
                   name="table_cell_{{ forloop.parentloop.counter0 }}_{{ forloop.counter0 }}"
                   class="form-control form-control-sm"
                   value="{{ cell }}">
          </td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endif %}
